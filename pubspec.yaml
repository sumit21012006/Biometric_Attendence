name: biometric
description: A Device Fingerprint & Location-based Attendance System for Employees.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core and Authentication
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  google_sign_in: ^6.3.0

  # Database
  cloud_firestore: ^6.4.1

  # Device Hardware and Biometrics
  device_info_plus: ^13.1.0
  local_auth: ^2.3.0
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4

  # Geolocation and Distance calculations
  geolocator: ^10.1.0

  # State Management
  provider: ^6.1.2

  # Utilities
  http: ^1.2.0
  intl: ^0.19.0
  url_launcher: ^6.3.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/school_logo.jpg"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
